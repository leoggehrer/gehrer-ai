services:
  landing:
    build: .
    labels:
      - traefik.enable=true
      - traefik.docker.network=n8n_default
      - traefik.http.routers.landing.rule=Host(`gehrer-ai.com`) || Host(`www.gehrer-ai.com`)
      - traefik.http.routers.landing.tls=true
      - traefik.http.routers.landing.entrypoints=web,websecure
      - traefik.http.routers.landing.tls.certresolver=mytlschallenge
      - traefik.http.services.landing.loadbalancer.server.port=80
    networks:
      - n8n_default
    restart: unless-stopped

networks:
  n8n_default:
    external: true
